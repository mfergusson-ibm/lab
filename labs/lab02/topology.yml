provider: clab
defaults.device: iol
defaults.devices.iol.clab.image: vrnetlab/cisco_iol:17.16.01a
defaults.devices.eos.clab.image: "ceos:4.36.0F"


addressing:
  mgmt:
    ipv4: 192.168.200.0/24
  p2p:
    ipv4: 172.16.1.0/24
    prefix: 30

nodes:
  - name: r1
    module: [ ospf, bgp, routing ]
    bgp.next_hop_self: True
    # Only originate r1's own loopback, not h1's (to avoid Null0 route)
    bgp.originate: [ 10.0.0.1/32 ]
    # Static route to h1's loopback - will be advertised via BGP network statement
    routing.static:
      - ipv4: 10.0.0.8/32
        nexthop:
          ipv4: 172.16.2.8
    # Advertise h1's loopback into BGP (uses static route, no Null0)
    bgp.advertise: [ 10.0.0.8/32 ]

  - name: r2
    module: [ ospf, bgp ]
    bgp.next_hop_self: True

  - name: r3
    module: [ ospf, bgp ]
    bgp.next_hop_self: True

  - name: r4
    module: [ bgp ]
    bgp.next_hop_self: True

  - name: r5
    module: [ ospf, bgp, routing ]
    bgp.next_hop_self: True
    bgp.originate: [ 10.0.0.5/32 ]
    bgp.advertise: [ 10.10.10.0/24 ]
    ospf.default:
      always: true

  - name: r6
    module: [ ospf, bgp ]
    device: eos
    clab:
      image: ceos:4.36.0F
    config: [ snmp-eos ]

  - name: r99
    module: [ ospf, routing ]
    ospf.passive: False
    device: frr
    routing.static:
      - ipv4: 0.0.0.0/0
        nexthop.node: r5
    clab:
      binds:
        - frr-setup-snmp.sh:/usr/local/bin/setup-snmp.sh
      exec:
      - apk add net-snmp net-snmp-tools frr-snmp
      - chmod +x /usr/local/bin/setup-snmp.sh
      - /usr/local/bin/setup-snmp.sh || true
    config: [ snmp-frr.j2 ]

  - name: h1
    device: linux
    module: [ routing ]
    loopback: True
    routing.static:
    - ipv4: 0.0.0.0/0
      nexthop.node: r1
    clab:
      binds:
        - snmp-linux.sh:/usr/local/bin/setup-snmp.sh
      exec:
        - chmod +x /usr/local/bin/setup-snmp.sh
        - /usr/local/bin/setup-snmp.sh || true

groups:
  cisco:
    members: [ r1, r2, r3, r4, r5 ]
    config: [ common, ipsla_keepalive ]
  ipfix_r5:
    members: r5
    config: [ ipfix_r5 ]
  ipsla_r5:
    members: r5
    config: [ ipsla_r5 ]
  ipsla_responder:
    members: r1
    config: [ ipsla_responder ]
      #qos_r4:
      #members: r4
      #config: [ qos_r4 ]

bgp:
  advertise_loopback: True
  as_list:
    64521:
      members: [ r1, r2, r3 ]
    64522:
      members: [ r4 ]
    64523:
      members: [ r5, r6 ]

links:
  - r1:
      ospf.cost: 1
  - r1-r2
  - r1-r3
  - r2-r3
  - r2-r4
  - r3-r4
  - r4-r5
  - r5-r99
  - r99:
      ipv4: 10.10.10.99/24
    clab:
      uplink: ens160
  - r5-r6
  - r6-r99
  - r1-h1

