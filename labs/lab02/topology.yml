# Last Updated: 31/05/26, mark.fergusson@ibm.com
# Change references to 10.10.10.0 as required
# Note that although Netlab encorages "common blocks", FRR and SNMP is so finicky I've done on a per router basis.
# Getting this to work in the first instance was through lots of trial and error.
#
# 31/05/26: r6 configured for Arista cEOS
#
provider: clab
defaults.device: frr
defaults.devices.eos.clab.image: "ceos:4.36.0F"

addressing:
  mgmt:
    ipv4: 192.168.200.0/24
  p2p:
    ipv4: 172.16.1.0/24
    prefix: 30

nodes:
  - name: r1
    module: [ ospf, bgp, routing ]
    bgp.next_hop_self: True
    routing.static:
      - ipv4: 10.0.0.8/32
        nexthop:
          ipv4: 172.16.2.8
    bgp.advertise: [ 10.0.0.8/32 ]
    clab:
      binds:
        - frr-setup-snmp.sh:/usr/local/bin/setup-snmp.sh
      exec:
      - apk add net-snmp net-snmp-tools frr-snmp
      - chmod +x /usr/local/bin/setup-snmp.sh
      - /usr/local/bin/setup-snmp.sh || true

  - name: r2
    module: [ ospf, bgp, routing ]
    bgp.next_hop_self: True
    routing.static:
      - ipv4: 10.0.0.0/28
        nexthop:
          discard: true
    bgp.advertise: [ 10.0.0.0/28 ]
    clab:
      binds:
        - frr-setup-snmp.sh:/usr/local/bin/setup-snmp.sh
      exec:
      - apk add net-snmp net-snmp-tools frr-snmp
      - chmod +x /usr/local/bin/setup-snmp.sh
      - /usr/local/bin/setup-snmp.sh || true

  - name: r3
    module: [ ospf, bgp, routing ]
    bgp.next_hop_self: True
    routing.static:
      - ipv4: 10.0.0.0/28
        nexthop:
          discard: true
    bgp.advertise: [ 10.0.0.0/28 ]
    clab:
      binds:
        - frr-setup-snmp.sh:/usr/local/bin/setup-snmp.sh
      exec:
      - apk add net-snmp net-snmp-tools frr-snmp
      - chmod +x /usr/local/bin/setup-snmp.sh
      - /usr/local/bin/setup-snmp.sh || true

  - name: r4
    module: [ bgp ]
    bgp.next_hop_self: True
    clab:
      binds:
        - frr-setup-snmp.sh:/usr/local/bin/setup-snmp.sh
      exec:
      - apk add net-snmp net-snmp-tools frr-snmp
      - chmod +x /usr/local/bin/setup-snmp.sh
      - /usr/local/bin/setup-snmp.sh || true

  - name: r5
    module: [ ospf, bgp, routing ]
    bgp.next_hop_self: True
    bgp.advertise: [ 10.10.10.0/24 ]
    ospf.default:
      always: true
    clab:
      binds:
        - frr-setup-snmp.sh:/usr/local/bin/setup-snmp.sh
      exec:
      - apk add net-snmp net-snmp-tools frr-snmp
      - chmod +x /usr/local/bin/setup-snmp.sh
      - /usr/local/bin/setup-snmp.sh || true

  - name: r6
    module: [ ospf, bgp ]
    device: eos
    clab:
      image: ceos:4.36.0F
    config: [ snmp-eos ]
  - name: r99
    module: [ ospf, routing ]
    ospf.passive: False
    routing.static:
      - ipv4: 0.0.0.0/0
        nexthop.node: r5
    clab:
      binds:
        - frr-setup-snmp.sh:/usr/local/bin/setup-snmp.sh
      exec:
      - apk add net-snmp net-snmp-tools frr-snmp
      - chmod +x /usr/local/bin/setup-snmp.sh
      - /usr/local/bin/setup-snmp.sh || true

  - name: h1
    device: linux
    module: [ routing ]
    loopback: True
    routing.static:
    - ipv4: 0.0.0.0/0
      nexthop.node: r1
    clab:
      binds:
        - snmp-linux.sh:/usr/local/bin/setup-snmp.sh
      exec:
        - chmod +x /usr/local/bin/setup-snmp.sh
        - /usr/local/bin/setup-snmp.sh || true

bgp:
  advertise_loopback: True
  as_list:
    64521:
      members: [ r1, r2, r3 ]
    64522:
      members: [ r4 ]
    64523:
      members: [ r5, r6 ]

links:
  - r1:
      ospf.cost: 1
  - r1-r2
  - r1-r3
  - r2-r3
  - r2-r4
  - r3-r4
  - r4-r5
  - r5-r99
  - r99:
      ipv4: 10.10.10.99/24
    clab:
      uplink: ens160
  - r5-r6
  - r6-r99
  - r1-h1
